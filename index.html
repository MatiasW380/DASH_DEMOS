<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>TRADING BOT DASHBOARD · BTC + SOL</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #080a0c;
  --bg2: #0e1115;
  --bg3: #141820;
  --bd: #1e2530;
  --text: #e2e8f0;
  --muted: #4a5568;
  --muted2: #64748b;
  --green: #00e676;
  --red: #ff3d57;
  --yellow: #ffab00;
  --mono: 'Space Mono', monospace;
  --cond: 'Barlow Condensed', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { 
  background: var(--bg); 
  color: var(--text); 
  font-family: var(--mono); 
  font-size: 13px; 
  height: 100vh;
  overflow: hidden;
}
body { padding: 12px; }
.container { 
  max-width: 1600px; 
  margin: 0 auto; 
  height: 100%;
  display: flex;
  flex-direction: column;
}
.header { margin-bottom: 16px; text-align: center; flex-shrink: 0; }
.header h1 { font-family: var(--cond); font-size: 24px; font-weight: 900; color: var(--green); letter-spacing: 0.05em; }
.header p { font-size: 9px; color: var(--muted2); margin-top: 4px; }
.dashboard { 
  display: grid; 
  grid-template-columns: 1fr 1fr; 
  gap: 16px; 
  flex: 1;
  min-height: 0;
}
.bot-card { 
  background: var(--bg2); 
  border: 1px solid var(--bd); 
  border-radius: 16px; 
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
}
.bot-header { 
  padding: 12px 16px; 
  border-bottom: 1px solid var(--bd); 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  flex-wrap: wrap; 
  gap: 8px; 
  flex-shrink: 0;
}
.bot-name { font-family: var(--cond); font-size: 20px; font-weight: 900; }
.bot-name.btc { color: #f7931a; }
.bot-name.sol { color: #00d4aa; }
.status-badge { display: flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 9px; font-weight: 700; background: var(--bg3); border: 1px solid var(--bd); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
.status-badge.alive { border-color: var(--green); color: var(--green); background: rgba(0,230,118,0.1); }
.status-badge.alive .status-dot { background: var(--green); animation: blink 2s infinite; }
.status-badge.dead { border-color: var(--red); color: var(--red); background: rgba(255,61,87,0.15); }
.metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--bd); flex-shrink: 0; }
.metric { background: var(--bg3); padding: 10px; text-align: center; }
.metric-value { font-size: 18px; font-weight: 700; font-family: var(--cond); }
.metric-label { font-size: 7px; color: var(--muted2); letter-spacing: 0.08em; margin-top: 3px; }
.position-section { padding: 12px 16px; border-bottom: 1px solid var(--bd); flex-shrink: 0; }
.position-badge { display: inline-block; padding: 3px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; font-family: var(--cond); letter-spacing: 0.05em; background: var(--bg3); }
.position-badge.long { background: rgba(0,230,118,0.15); color: var(--green); }
.position-badge.short { background: rgba(255,61,87,0.15); color: var(--red); }
.position-badge.flat { background: var(--bg3); color: var(--muted2); }
.position-details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
.position-detail { background: var(--bg3); border-radius: 8px; padding: 6px; text-align: center; }
.position-detail-label { font-size: 6px; color: var(--muted2); letter-spacing: 0.08em; }
.position-detail-value { font-size: 11px; font-weight: 700; margin-top: 2px; }
.trades-section, .snapshots-section { padding: 10px 16px; border-bottom: 1px solid var(--bd); flex-shrink: 0; }
.section-title { font-size: 8px; letter-spacing: 0.14em; color: var(--muted2); font-weight: 700; margin-bottom: 8px; text-transform: uppercase; }
.trades-table { width: 100%; font-size: 9px; border-collapse: collapse; }
.trades-table th { text-align: left; padding: 4px 3px; color: var(--muted2); font-weight: 700; border-bottom: 1px solid var(--bd); }
.trades-table td { padding: 4px 3px; border-bottom: 1px solid rgba(30,37,48,0.4); }
.pill { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 7px; font-weight: 700; }
.pill-long { background: rgba(0,230,118,0.15); color: var(--green); }
.pill-short { background: rgba(255,61,87,0.15); color: var(--red); }
.pill-tp { background: rgba(0,230,118,0.15); color: var(--green); }
.pill-sl { background: rgba(255,61,87,0.15); color: var(--red); }
.snapshot-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(30,37,48,0.4); font-size: 9px; }
.snapshot-date { color: var(--muted2); }
.snapshot-return { font-weight: 700; }
.update-time { text-align: center; margin-top: 12px; font-size: 8px; color: var(--muted2); padding: 8px; flex-shrink: 0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Desktop: sin scroll, todo visible */
@media (min-width: 901px) {
  body { padding: 10px; }
  .header h1 { font-size: 22px; }
  .dashboard { gap: 12px; }
  .bot-card { overflow-y: auto; }
  .bot-card::-webkit-scrollbar { width: 4px; }
  .bot-card::-webkit-scrollbar-track { background: var(--bg3); }
  .bot-card::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 4px; }
}

/* Mobile: scroll normal */
@media (max-width: 900px) { 
  .dashboard { grid-template-columns: 1fr; } 
  body { padding: 12px; height: auto; overflow-y: auto; }
  html, body { height: auto; overflow-y: auto; }
  .metrics-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>◈ TRADING BOT DASHBOARD</h1>
    <p>BTC · SOL · CRUCE EMA3/10 · 10x</p>
  </div>
  <div class="dashboard" id="dashboard">
    <div class="bot-card" id="btc-card">
      <div class="bot-header">
        <span class="bot-name btc">◈ BTC SCALPING</span>
        <div class="status-badge" id="btc-status"><span class="status-dot"></span><span>CONECTANDO</span></div>
      </div>
      <div class="metrics-grid" id="btc-metrics"></div>
      <div class="position-section" id="btc-position"></div>
      <div class="trades-section" id="btc-trades"></div>
      <div class="snapshots-section" id="btc-snapshots"></div>
    </div>
    <div class="bot-card" id="sol-card">
      <div class="bot-header">
        <span class="bot-name sol">◈ SOL SCALPING</span>
        <div class="status-badge" id="sol-status"><span class="status-dot"></span><span>CONECTANDO</span></div>
      </div>
      <div class="metrics-grid" id="sol-metrics"></div>
      <div class="position-section" id="sol-position"></div>
      <div class="trades-section" id="sol-trades"></div>
      <div class="snapshots-section" id="sol-snapshots"></div>
    </div>
  </div>
  <div class="update-time" id="update-time">Actualizando...</div>
</div>

<script>
const API_BASE = "https://matiasbarone.pythonanywhere.com";
const REFRESH = 60000;
const INITIAL_CAPITAL = 1000;

async function fetchBotData(endpoint, botId) {
  try {
    const [stateRes, tradesRes, snapshotsRes] = await Promise.all([
      fetch(`${API_BASE}${endpoint}/state`),
      fetch(`${API_BASE}${endpoint}/trades`),
      fetch(`${API_BASE}${endpoint}/snapshots`)
    ]);
    const state = await stateRes.json();
    let trades = await tradesRes.json();
    let snapshots = await snapshotsRes.json();
    
    if (!Array.isArray(trades)) {
      trades = [];
    }
    if (!Array.isArray(snapshots)) {
      snapshots = [];
    }
    
    return { state, trades, snapshots };
  } catch (e) {
    console.error(`${botId} error:`, e);
    return { state: { error: true }, trades: [], snapshots: [] };
  }
}

function formatNumber(n, decimals = 2) {
  if (n === undefined || n === null) return '—';
  return typeof n === 'number' ? n.toLocaleString(undefined, { minimumFractionDigits: decimals, maximumFractionDigits: decimals }) : n;
}

function formatPercent(n, decimals = 2) {
  if (n === undefined || n === null) return '—';
  const val = typeof n === 'number' ? n : parseFloat(n);
  if (isNaN(val)) return '—';
  return `${val >= 0 ? '+' : ''}${val.toFixed(decimals)}%`;
}

// Determinar color para RETURN: verde si >0, rojo si <0, blanco si ==0
function getReturnColor(value) {
  if (value > 0) return 'green';
  if (value < 0) return 'red';
  return 'text'; // blanco
}

// Determinar color para WIN RATE: verde si >50, rojo si <=50
function getWRColor(value) {
  if (value > 50) return 'green';
  return 'red';
}

function renderMetrics(containerId, state) {
  const container = document.getElementById(containerId);
  if (!container) return;
  
  if (state.error) {
    container.innerHTML = `<div class="metric"><div class="metric-value">ERROR</div><div class="metric-label">NO DATA</div></div>`.repeat(4);
    return;
  }
  
  const cap = state.capital || 0;
  const ret = ((cap - INITIAL_CAPITAL) / INITIAL_CAPITAL) * 100;
  const wins = state.total_wins || 0;
  const losses = state.total_losses || 0;
  const tot = wins + losses;
  const wr = tot > 0 ? (wins / tot) * 100 : 0;
  const dd = state.max_drawdown_pct || 0;
  
  const returnColor = getReturnColor(ret);
  const wrColor = getWRColor(wr);
  
  container.innerHTML = `
    <div class="metric"><div class="metric-value ${returnColor}">${formatPercent(ret, 2)}</div><div class="metric-label">RETURN</div></div>
    <div class="metric"><div class="metric-value ${wrColor}">${wr.toFixed(1)}%</div><div class="metric-label">WIN RATE</div></div>
    <div class="metric"><div class="metric-value red">${dd.toFixed(1)}%</div><div class="metric-label">MAX DD</div></div>
    <div class="metric"><div class="metric-value text">$${(cap / 1000).toFixed(1)}k</div><div class="metric-label">CAPITAL</div></div>
  `;
}

function renderPosition(containerId, state, price) {
  const container = document.getElementById(containerId);
  if (!container) return;
  
  if (state.error) {
    container.innerHTML = `<div class="position-badge flat">ERROR</div><div class="position-details"><div class="position-detail">—</div></div>`;
    return;
  }
  
  const position = state.position;
  const entryPrice = state.entry_price || 0;
  const isBTC = price > 10000;
  const tpPct = isBTC ? 4.0 : 5.0;
  const slPct = isBTC ? 1.2 : 1.5;
  const lev = 10;
  
  let tp = 0, sl = 0, pnl = 0;
  if (position && entryPrice > 0 && price > 0) {
    if (position === 'LONG') {
      tp = entryPrice * (1 + tpPct / lev / 100);
      sl = entryPrice * (1 - slPct / lev / 100);
      pnl = ((price - entryPrice) / entryPrice) * lev * 100;
    } else if (position === 'SHORT') {
      tp = entryPrice * (1 - tpPct / lev / 100);
      sl = entryPrice * (1 + slPct / lev / 100);
      pnl = ((entryPrice - price) / entryPrice) * lev * 100;
    }
  }
  
  const positionClass = position ? position.toLowerCase() : 'flat';
  const positionText = position || 'FLAT';
  const pnlColor = pnl > 0 ? 'green' : (pnl < 0 ? 'red' : 'text');
  const pnlText = position ? `${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}%` : '—';
  
  container.innerHTML = `
    <div class="position-badge ${positionClass}">${positionText}</div>
    <div class="position-details">
      <div class="position-detail"><div class="position-detail-label">ENTRADA</div><div class="position-detail-value">${entryPrice > 0 ? `$${formatNumber(entryPrice, 2)}` : '—'}</div></div>
      <div class="position-detail"><div class="position-detail-label">PnL</div><div class="position-detail-value ${pnlColor}">${pnlText}</div></div>
      <div class="position-detail"><div class="position-detail-label">TP / SL</div><div class="position-detail-value">${tp > 0 ? `$${formatNumber(tp, 2)} / $${formatNumber(sl, 2)}` : '—'}</div></div>
    </div>
  `;
}

function renderTrades(containerId, trades, botType) {
  const container = document.getElementById(containerId);
  if (!container) return;
  
  if (!trades || trades.length === 0) {
    container.innerHTML = `<div class="section-title">ÚLTIMAS OPERACIONES</div><div style="color:var(--muted2);text-align:center;padding:8px;">Sin operaciones</div>`;
    return;
  }
  
  const lastTrades = [...trades].reverse().slice(0, 5);
  const isBTC = botType === 'btc';
  
  container.innerHTML = `
    <div class="section-title">ÚLTIMAS OPERACIONES</div>
    <table class="trades-table">
      <thead><tr><th>LADO</th><th>ENTRADA</th><th>PnL</th><th>RES</th><th>${isBTC ? 'RSI' : 'EMA3/10'}</th></tr></thead>
      <tbody>
        ${lastTrades.map(t => {
          const pnlValue = t.pnl_pct || 0;
          const pnlColor = pnlValue > 0 ? 'green' : (pnlValue < 0 ? 'red' : 'text');
          return `
          <tr>
            <td><span class="pill pill-${t.side?.toLowerCase()}">${t.side || '—'}</span></td>
            <td>$${formatNumber(t.entry_price, 2)}</span></td>
            <td class="${pnlColor}">${formatPercent(pnlValue, 2)}</span></td>
            <td><span class="pill pill-${(t.reason || '').toLowerCase()}">${t.reason || '—'}</span></span></td>
            <td>${isBTC ? (t.entry_rsi?.toFixed(1) || '—') : `${t.entry_ema_fast?.toFixed(2) || '—'}/${t.entry_ema_slow?.toFixed(2) || '—'}`}</span></td>
          </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}

function renderSnapshots(containerId, snapshots) {
  const container = document.getElementById(containerId);
  if (!container) return;
  
  if (!snapshots || snapshots.length === 0) {
    container.innerHTML = `<div class="section-title">HISTORIAL DIARIO</div><div style="color:var(--muted2);text-align:center;padding:8px;">Sin datos</div>`;
    return;
  }
  
  const lastSnapshots = [...snapshots].reverse().slice(0, 3);
  
  container.innerHTML = `
    <div class="section-title">HISTORIAL DIARIO</div>
    ${lastSnapshots.map(s => {
      const returnVal = s.return_total || 0;
      const returnColor = returnVal > 0 ? 'green' : (returnVal < 0 ? 'red' : 'text');
      return `
      <div class="snapshot-row">
        <span class="snapshot-date">${s.date || '—'}</span>
        <span class="snapshot-return ${returnColor}">${formatPercent(returnVal, 2)}</span>
        <span style="color:var(--muted2)">WR ${(s.win_rate || 0).toFixed(0)}%</span>
      </div>
      `;
    }).join('')}
  `;
}

function updateStatus(botId, alive) {
  const statusDiv = document.getElementById(`${botId}-status`);
  if (!statusDiv) return;
  if (alive) {
    statusDiv.className = 'status-badge alive';
    statusDiv.innerHTML = '<span class="status-dot"></span><span>ACTIVO</span>';
  } else {
    statusDiv.className = 'status-badge dead';
    statusDiv.innerHTML = '<span class="status-dot"></span><span>DESCONECTADO</span>';
  }
}

async function updateAll() {
  try {
    const [btcData, solData] = await Promise.all([
      fetchBotData('/api', 'BTC'),
      fetchBotData('/api/sol', 'SOL')
    ]);
    
    const btcAlive = !btcData.state.error && (btcData.state.capital > 0);
    const solAlive = !solData.state.error && (solData.state.capital > 0);
    
    updateStatus('btc', btcAlive);
    updateStatus('sol', solAlive);
    
    renderMetrics('btc-metrics', btcData.state);
    renderPosition('btc-position', btcData.state, btcData.state.last_price || 0);
    renderTrades('btc-trades', btcData.trades, 'btc');
    renderSnapshots('btc-snapshots', btcData.snapshots);
    
    renderMetrics('sol-metrics', solData.state);
    renderPosition('sol-position', solData.state, solData.state.last_price || 0);
    renderTrades('sol-trades', solData.trades, 'sol');
    renderSnapshots('sol-snapshots', solData.snapshots);
    
    document.getElementById('update-time').textContent = `Última actualización: ${new Date().toLocaleTimeString('es-AR')}`;
  } catch (error) {
    console.error('Error:', error);
    document.getElementById('update-time').textContent = `Error: ${error.message}`;
  }
}

updateAll();
setInterval(updateAll, REFRESH);
</script>
</body>
</html>
